<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarteel</title>
    <meta name="theme-color" content="#2c2416">
  </head>
  <body>
    <div id="app">
      <div id="loading-status">
        <p class="loading-status-main">Preparing model...</p>
        <div class="loading-progress-track">
          <div class="loading-progress-fill" id="loading-progress"></div>
        </div>
        <p class="loading-status-sub" id="loading-detail">Downloading</p>
      </div>
      <div id="listening-status" hidden>
        <p class="listening-status-main">Listening...</p>
        <p class="listening-status-sub">Begin your recitation</p>
      </div>
      <div id="ready-state" hidden>
        <p class="ready-prompt">Tap to begin recitation</p>
        <button id="btn-start" class="rec-btn rec-btn--start">Start</button>
      </div>
      <div id="recording-state" hidden>
        <div class="listening-card" aria-live="polite">
          <p class="listening-eyebrow">Mic is live</p>
          <div class="waveform" id="listening-waveform" aria-hidden="true">
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
            <span class="waveform-bar"></span>
          </div>
          <p class="listening-callout">Read now</p>
        </div>
        <button id="btn-stop" class="rec-btn rec-btn--stop">Stop</button>
      </div>
      <div id="post-recording" hidden>
        <div class="post-actions">
          <button id="btn-report" class="action-btn action-btn--report">Report Error</button>
          <button id="btn-restart" class="action-btn action-btn--restart">Start Again</button>
        </div>
      </div>
      <div id="verses"></div>
      <div id="candidate-status" hidden></div>
      <div id="raw-transcript"></div>
      <details id="debug-panel" class="debug-panel">
        <summary>
          <span>Debug view</span>
          <span class="debug-summary-actions">
            <span id="debug-copy-status" class="debug-copy-status" aria-live="polite"></span>
            <button id="debug-copy" class="debug-copy-btn" type="button">Copy JSON</button>
            <span id="debug-summary">0 events</span>
          </span>
        </summary>
        <div id="debug-content" class="debug-content"></div>
      </details>
      <div id="listening-indicator">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-dot"></div>
      </div>
      <div id="permission-prompt" hidden>
        <p>Microphone access is needed to listen to your recitation.</p>
      </div>
      <div id="offline-badge">
        <span id="model-status">Loading model...</span>
        <span class="badge-sep">&middot;</span>
        on-device recognition
      </div>

      <a id="github-link" href="https://github.com/yazinsai/offline-tarteel" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.475 2 2 6.475 2 12a9.994 9.994 0 0 0 6.838 9.488c.5.087.687-.213.687-.476c0-.237-.013-1.024-.013-1.862c-2.512.463-3.162-.612-3.362-1.175c-.113-.288-.6-1.175-1.025-1.413c-.35-.187-.85-.65-.013-.662c.788-.013 1.35.725 1.538 1.025c.9 1.512 2.338 1.087 2.912.825c.088-.65.35-1.087.638-1.337c-2.225-.25-4.55-1.113-4.55-4.938c0-1.088.387-1.987 1.025-2.688c-.1-.25-.45-1.275.1-2.65c0 0 .837-.262 2.75 1.026a9.28 9.28 0 0 1 2.5-.338c.85 0 1.7.112 2.5.337c1.912-1.3 2.75-1.024 2.75-1.024c.55 1.375.2 2.4.1 2.65c.637.7 1.025 1.587 1.025 2.687c0 3.838-2.337 4.688-4.562 4.938c.362.312.675.912.675 1.85c0 1.337-.013 2.412-.013 2.75c0 .262.188.574.688.474A10.016 10.016 0 0 0 22 12c0-5.525-4.475-10-10-10Z"/></svg>
        Open source
      </a>

      <dialog id="report-dialog">
        <div class="dialog-content">
          <h2 class="dialog-title">Report Error</h2>

          <div class="dialog-section">
            <label class="dialog-label">Your recording</label>
            <audio id="report-audio" controls></audio>
          </div>

          <div class="dialog-section">
            <label class="dialog-label">What were you reciting?</label>
            <div class="verse-selectors">
              <select id="report-surah"></select>
              <select id="report-ayah"></select>
            </div>
          </div>

          <div class="dialog-section">
            <label class="dialog-label">Model predicted</label>
            <p id="report-prediction" class="prediction-text"></p>
          </div>

          <div class="dialog-section">
            <label class="dialog-label">Notes (optional)</label>
            <textarea id="report-notes" rows="3" placeholder="Describe the issue..."></textarea>
          </div>

          <div class="dialog-actions">
            <button id="btn-submit-report" class="action-btn action-btn--report">Submit</button>
            <button id="btn-cancel-report" class="action-btn action-btn--restart">Cancel</button>
          </div>

          <p id="report-status" class="report-status" hidden></p>
        </div>
      </dialog>
    </div>
    <script>
      // Unregister old service worker that cached stale assets
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          for (var r of regs) r.unregister();
        });
        caches.keys().then(function (keys) {
          for (var k of keys) caches.delete(k);
        });
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
